<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PDF → PNG extractor</title>
<style>
body { font-family: system-ui, sans-serif; padding: 24px; max-width: 720px; margin: auto; }
h1 { font-size: 18px; }
#status { margin-top: 12px; padding: 12px; background: #f5f5f5; border-radius: 8px; min-height: 24px; white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 13px; }
input[type=file] { padding: 8px; background: #245692; color: white; border-radius: 6px; }
#preview { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 12px; }
#preview img { width: 100%; height: auto; border: 1px solid #ddd; }
</style>
</head>
<body>
<h1>PDF → PNG slide extractor</h1>
<input type="file" id="pdfInput" accept="application/pdf">
<div id="status">Waiting for PDF...</div>
<div id="preview"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const status = document.getElementById('status');
const preview = document.getElementById('preview');
const log = (msg) => { status.textContent = msg; console.log(msg); };

window.__progress = { state: 'idle', current: 0, total: 0, error: null, done: false };

async function processPdf(file) {
  try {
    window.__progress.state = 'loading';
    log('Loading PDF (' + (file.size / 1048576).toFixed(2) + ' MB)...');
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    window.__progress.total = pdf.numPages;
    log('Loaded ' + pdf.numPages + ' pages. Rendering...');

    const zip = new JSZip();
    for (let i = 1; i <= pdf.numPages; i++) {
      window.__progress.current = i;
      window.__progress.state = 'rendering';
      log('Rendering page ' + i + '/' + pdf.numPages + '...');
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 2 });
      const canvas = document.createElement('canvas');
      canvas.width  = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
      const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
      const ab = await blob.arrayBuffer();
      const name = 'page-' + String(i).padStart(2, '0') + '.png';
      zip.file(name, ab);

      // thumbnail
      const img = document.createElement('img');
      img.src = URL.createObjectURL(blob);
      preview.appendChild(img);
    }

    window.__progress.state = 'zipping';
    log('Zipping ' + pdf.numPages + ' images...');
    const zipBlob = await zip.generateAsync({ type: 'blob' });

    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'furutec-slides.zip';
    document.body.appendChild(a);
    a.click();
    a.remove();

    window.__progress.state = 'done';
    window.__progress.done = true;
    log('DONE. Downloaded furutec-slides.zip (' + pdf.numPages + ' pages, ' + (zipBlob.size/1048576).toFixed(2) + ' MB).');
  } catch (e) {
    window.__progress.state = 'error';
    window.__progress.error = e.message || String(e);
    log('ERROR: ' + (e.message || String(e)));
    console.error(e);
  }
}

document.getElementById('pdfInput').addEventListener('change', (e) => {
  if (e.target.files[0]) processPdf(e.target.files[0]);
});
</script>
</body>
</html>
